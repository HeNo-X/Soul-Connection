<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>压力云朵消消乐</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-image: url('../../static/LargePic/Clouds.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
        }

        /* 导航栏 */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(2px);
            position: relative;
            z-index: 20;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #f5eef2;
            border-radius: 30px;
            padding: 8px 16px;
			margin-left:4%;
            font-size: 0.9rem;
            font-weight: 600;
            color: #e87c9f;
            cursor: pointer;
            transition: all 0.5s;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(2px);
        }
        .back-btn:hover {
            background: #ffffff;
            transform: translateX(-2px);
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 600;
			margin-left: -6%;
            background: linear-gradient(135deg, #e87c9f, #b382c2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-placeholder { width: 80px; }

        /* 主内容区 */
        .container {
            text-align: center;
            padding: 10px 20px 20px;
            position: relative;
            z-index: 15;
            pointer-events: none;
        }
        .title {
            font-size: 32px;
            color: #e17a99;
            margin-bottom: 8px;
        }
        .desc {
            font-size: 22px;
            color: #d46b8e;
            font-weight: 500;
            background: rgba(255,250,250,0.3);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* 云朵样式 */
        .cloud {
            position: absolute;
            border-radius: 200px / 140px;
            box-shadow: 0 12px 28px rgba(232, 124, 159, 0.35);
            cursor: grab;
            z-index: 10;
            will-change: left, top, transform;
            transition: box-shadow 0.1s;
        }
        .cloud:active { cursor: grabbing; }
        .cloud.drag-active {
            box-shadow: 0 0 0 4px #ffa5c0;
            filter: brightness(1.02);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: inherit;
        }
        .cloud.shape1::before { width: 70%; height: 110%; top: -45%; left: 10%; }
        .cloud.shape1::after { width: 50%; height: 85%; top: -30%; right: 15%; }
        .cloud.shape2::before { width: 85%; height: 130%; top: -50%; left: 5%; }
        .cloud.shape2::after { width: 60%; height: 100%; top: -25%; right: 5%; }
        .cloud.shape3::before { width: 60%; height: 95%; top: -40%; left: 15%; }
        .cloud.shape3::after { width: 45%; height: 75%; top: -20%; right: 20%; }
        .cloud.shape4::before { width: 75%; height: 120%; top: -48%; left: 8%; }
        .cloud.shape4::after { width: 55%; height: 90%; top: -28%; right: 12%; }
        .cloud.shape5::before { width: 90%; height: 140%; top: -55%; left: 2%; }
        .cloud.shape5::after { width: 65%; height: 110%; top: -35%; right: 2%; }
        .cloud.type1 { background: linear-gradient(135deg, #fffcfd 0%, #fcf0f7 100%); }
        .cloud.type2 { background: linear-gradient(135deg, #fffcfd 0%, #fcf0f7 100%); }
        .cloud.type3 { background: linear-gradient(135deg, #fffcfd 0%, #fcf0f7 100%); }
        .cloud-text {
            position: relative;
            z-index: 11;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
        }

        /* CSS 浮动动画 (幅度 ±14~28px，速度减慢) */
        @keyframes float1 {
            0% { transform: translate(0, 0); }
            25% { transform: translate(18px, -14px); }
            50% { transform: translate(-16px, 20px); }
            75% { transform: translate(22px, -12px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes float2 {
            0% { transform: translate(0, 0); }
            33% { transform: translate(-24px, -18px); }
            66% { transform: translate(20px, 22px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes float3 {
            0% { transform: translate(0, 0); }
            50% { transform: translate(28px, -20px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes float4 {
            0% { transform: translate(0, 0); }
            40% { transform: translate(-20px, 26px); }
            80% { transform: translate(24px, -18px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes float5 {
            0% { transform: translate(0, 0); }
            25% { transform: translate(14px, -28px); }
            75% { transform: translate(-26px, 22px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes float6 {
            0% { transform: translate(0, 0); }
            30% { transform: translate(-28px, -16px); }
            60% { transform: translate(26px, 24px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes float7 {
            0% { transform: translate(0, 0); }
            20% { transform: translate(15px, 18px); }
            60% { transform: translate(-18px, -15px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes float8 {
            0% { transform: translate(0, 0); }
            45% { transform: translate(-22px, 22px); }
            90% { transform: translate(26px, -20px); }
            100% { transform: translate(0, 0); }
        }

        /* 飞走动画 */
        @keyframes flyLeft {
            to { transform: translateX(-550px) translateY(-100px) scale(0.2); opacity: 0; }
        }
        @keyframes flyRight {
            to { transform: translateX(550px) translateY(-80px) scale(0.2); opacity: 0; }
        }

        /* 报告弹窗 */
        .report {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff9fc;
            padding: 40px;
            border-radius: 20px;
            z-index: 200;
            display: none;
            max-width: 90%;
            width: 620px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .report h2 { color: #e17a99; text-align: center; margin-bottom: 20px; }
        .report p { font-size: 16px; line-height: 1.9; color: #884b63; }
        .report .solution {
            background: #fdf1f7;
            padding: 20px;
            border-radius: 12px;
            margin: 16px 0;
            border-left: 4px solid #f492c6;
        }
        .restart {
            background: linear-gradient(to right, #f9a8d4, #f492b6);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        .restart:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="back-btn" onclick="window.location.href='./Evaluate.html'">
            <i class="fa-solid fa-arrow-left"></i> 返回
        </div>
        <div class="logo">🌱 心灵共鸣舱</div>
        <div style="position: relative;">
            <div style="position: absolute;right: 50pt;" id="bgmControl" title="点击控制BGM播放/暂停" onclick="toggleBGM()">
                <div style="font-size: 24px; cursor: pointer; transition: 0.3s;" id="bgmIcon">🎵</div>
            </div>
        </div>
    </div>
    <div class="container">
        <h1 class="title">☁️压力云朵消消乐</h1>
        <p class="desc">点击消散你最想抛却的压力云朵 | 长按拖拽可甩飞云朵</p>
    </div>
    <div class="particles" id="particles"></div>
    <div class="report" id="report">
        <h2>📊 你的压力测评报告</h2>
        <div id="reportContent"></div>
        <button class="restart" onclick="location.reload()">重新开始</button>
    </div>

    <script>
        // ==================== 压力池 (随机取10个) ====================
        const fullPressurePool = [
            "考试压力", "社交焦虑", "家庭期待", "未来迷茫", "学业负担",
            "人际关系", "经济压力", "自我怀疑", "容貌焦虑", "同辈竞争",
            "睡眠不足", "孤独感", "就业恐惧", "时间紧迫", "完美主义",
            "失恋痛苦", "被否定", "选择困难", "健康担忧", "父母健康"
        ];

        function getRandomPressures(count = 10) {
            const shuffled = [...fullPressurePool];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count);
        }

        let pressures = getRandomPressures(10);
        let removeOrder = [];
        const cloudTypes = ["type1", "type2", "type3"];
        const cloudShapes = ["shape1", "shape2", "shape3", "shape4", "shape5"];
        const particlesContainer = document.getElementById('particles');

        const floatAnimations = ['float1', 'float2', 'float3', 'float4', 'float5', 'float6', 'float7', 'float8'];

        // 爆裂效果 (浅粉色粒子)
        function createBurstEffect(x, y) {
            const particleCount = 18 + Math.floor(Math.random() * 15);
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = (12 + Math.random() * 24) + 'px';
                particle.style.height = (12 + Math.random() * 24) + 'px';
                particle.style.borderRadius = '50%';
                particle.style.background = `radial-gradient(circle, #ffffff, #ffdde4)`;
                particle.style.boxShadow = '0 2px 8px rgba(0,0,0,0.05)';
                particle.style.left = (x - parseFloat(particle.style.width)/2) + 'px';
                particle.style.top = (y - parseFloat(particle.style.height)/2) + 'px';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '9999';
                const angle = Math.random() * Math.PI * 2;
                const distance = 150 + Math.random() * 250;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                particle.style.transition = 'all 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
                particlesContainer.appendChild(particle);
                requestAnimationFrame(() => {
                    particle.style.transform = `translate(${dx}px, ${dy}px) scale(0)`;
                    particle.style.opacity = '0';
                });
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // 加权随机消散类型
        function getWeightedDissolveType() {
            const r = Math.random();
            if (r < 0.5) return 'burst';
            if (r < 0.8) return Math.random() < 0.5 ? 'flyLeft' : 'flyRight';
            const fadeTypes = ['fade', 'enlargeFade', 'shrinkFade'];
            return fadeTypes[Math.floor(Math.random() * fadeTypes.length)];
        }

        function applyDissolve(cloud, type, onComplete) {
            const rect = cloud.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            switch(type) {
                case 'fade':
                    cloud.style.transition = 'opacity 1s ease';
                    cloud.style.opacity = '0';
                    setTimeout(onComplete, 1000);
                    break;
                case 'enlargeFade':
                    cloud.style.transition = 'transform 1s ease, opacity 1s ease';
                    cloud.style.transform = 'scale(1.7)';
                    cloud.style.opacity = '0';
                    setTimeout(onComplete, 1000);
                    break;
                case 'shrinkFade':
                    cloud.style.transition = 'transform 0.9s ease, opacity 0.9s ease';
                    cloud.style.transform = 'scale(0.05)';
                    cloud.style.opacity = '0';
                    setTimeout(onComplete, 900);
                    break;
                case 'burst':
                    createBurstEffect(centerX, centerY);
                    cloud.style.opacity = '0';
                    cloud.style.visibility = 'hidden';
                    setTimeout(onComplete, 400);
                    break;
                case 'flyLeft':
                    cloud.style.animation = 'flyLeft 0.8s cubic-bezier(0.2,0.9,0.4,1.1) forwards';
                    setTimeout(onComplete, 800);
                    break;
                case 'flyRight':
                    cloud.style.animation = 'flyRight 0.8s cubic-bezier(0.2,0.9,0.4,1.1) forwards';
                    setTimeout(onComplete, 800);
                    break;
                default:
                    cloud.style.transition = 'opacity 0.8s';
                    cloud.style.opacity = '0';
                    setTimeout(onComplete, 800);
            }
        }

        // 惯性运动 (上下反弹，左右飞走)
        let inertiaFrameId = null;
        function startInertia(cloud, vx, vy) {
            if (inertiaFrameId) cancelAnimationFrame(inertiaFrameId);
            if (!cloud || !cloud.parentNode) return;
            let left = cloud.offsetLeft;
            let top = cloud.offsetTop;
            const friction = 0.96;
            const bounceY = 0.7;
            const edgeMargin = 20;
            const maxX = window.innerWidth - cloud.offsetWidth - edgeMargin;
            const maxY = window.innerHeight - cloud.offsetHeight - edgeMargin;
            const minX = edgeMargin;
            const minY = edgeMargin;

            let currentVx = vx;
            let currentVy = vy;
            let currentLeft = left;
            let currentTop = top;

            function step() {
                if (!cloud || !cloud.parentNode) {
                    cancelAnimationFrame(inertiaFrameId);
                    return;
                }
                currentVx *= friction;
                currentVy *= friction;
                currentLeft += currentVx;
                currentTop += currentVy;

                // 左右边界 → 飞走消散
                if (currentLeft < minX || currentLeft > maxX) {
                    cancelAnimationFrame(inertiaFrameId);
                    if (cloud.dataset.disabled !== 'true') {
                        cloud.dataset.disabled = 'true';
                        const stressText = cloud.querySelector('.cloud-text').innerText;
                        const direction = currentLeft < minX ? 'flyLeft' : 'flyRight';
                        applyDissolve(cloud, direction, () => {
                            if (cloud.parentNode) cloud.remove();
                            removeOrder.push(stressText);
                            if (removeOrder.length === pressures.length) {
                                setTimeout(() => generateReport(), 600);
                            }
                        });
                    }
                    return;
                }
                // 上下边界反弹
                let bounced = false;
                if (currentTop < minY) {
                    currentTop = minY;
                    currentVy = -currentVy * bounceY;
                    bounced = true;
                }
                if (currentTop > maxY) {
                    currentTop = maxY;
                    currentVy = -currentVy * bounceY;
                    bounced = true;
                }
                cloud.style.left = currentLeft + 'px';
                cloud.style.top = currentTop + 'px';

                if (Math.abs(currentVx) < 0.2 && Math.abs(currentVy) < 0.2 && !bounced) {
                    cancelAnimationFrame(inertiaFrameId);
                    if (cloud && !cloud.dataset.disabled) {
                        cloud.style.animation = cloud.dataset.originalAnimation;
                    }
                    return;
                }
                inertiaFrameId = requestAnimationFrame(step);
            }
            inertiaFrameId = requestAnimationFrame(step);
        }

        // ==================== 重写云朵生成，基于实际尺寸放置 ====================
        function createClouds() {
            const placedClouds = []; // 存储已放置云朵的 { left, top, width, height }
            const edgeMargin = 20;
            // 有效区域：避开顶部标题区(0~120px)和底部边界
            const minY = 140;    // 避免遮挡标题
            const maxY = window.innerHeight - 180;
            const minX = edgeMargin;
            const maxX = window.innerWidth - edgeMargin;

            pressures.forEach((item) => {
                // 先创建临时元素，获取实际尺寸，但不加入DOM
                const tempCloud = document.createElement('div');
                const type = cloudTypes[Math.floor(Math.random() * cloudTypes.length)];
                const shape = cloudShapes[Math.floor(Math.random() * cloudShapes.length)];
                tempCloud.className = `cloud ${type} ${shape}`;
                const paddingH = 55 + Math.random() * 45;
                const paddingV = paddingH * 0.7;
                tempCloud.style.padding = `${paddingV}px ${paddingH}px`;
                const fontSize = 16 + Math.floor(Math.random() * 8);
                tempCloud.style.fontSize = `${fontSize}px`;
                const textSpan = document.createElement('span');
                textSpan.className = 'cloud-text';
                textSpan.innerText = item;
                tempCloud.appendChild(textSpan);
                // 临时添加到body以获取尺寸，然后立即移除
                tempCloud.style.position = 'absolute';
                tempCloud.style.visibility = 'hidden';
                tempCloud.style.top = '0';
                tempCloud.style.left = '0';
                document.body.appendChild(tempCloud);
                const width = tempCloud.offsetWidth;
                const height = tempCloud.offsetHeight;
                document.body.removeChild(tempCloud);

                // 寻找不重叠的位置
                let attempts = 0;
                let placed = false;
                let finalLeft = 0, finalTop = 0;
                while (!placed && attempts < 500) {
                    const left = minX + Math.random() * (maxX - width);
                    const top = minY + Math.random() * (maxY - height);
                    let overlap = false;
                    for (let p of placedClouds) {
                        if (left < p.left + p.width + 20 && left + width + 20 > p.left &&
                            top < p.top + p.height + 20 && top + height + 20 > p.top) {
                            overlap = true;
                            break;
                        }
                    }
                    if (!overlap) {
                        finalLeft = left;
                        finalTop = top;
                        placed = true;
                        placedClouds.push({ left, top, width, height });
                    }
                    attempts++;
                }
                if (!placed) {
                    // 保底：放在最右边顺次排列
                    finalLeft = edgeMargin + (placedClouds.length * 110) % (window.innerWidth - width - edgeMargin*2);
                    finalTop = minY + (placedClouds.length * 90) % (maxY - minY);
                    placedClouds.push({ left: finalLeft, top: finalTop, width, height });
                }

                // 正式创建云朵
                const cloud = document.createElement('div');
                cloud.className = `cloud ${type} ${shape}`;
                cloud.style.padding = `${paddingV}px ${paddingH}px`;
                cloud.style.fontSize = `${fontSize}px`;
                const textSpanFinal = document.createElement('span');
                textSpanFinal.className = 'cloud-text';
                textSpanFinal.innerText = item;
                cloud.appendChild(textSpanFinal);
                cloud.style.left = finalLeft + 'px';
                cloud.style.top = finalTop + 'px';

                // 随机浮动动画
                const randomFloat = floatAnimations[Math.floor(Math.random() * floatAnimations.length)];
                const duration = 12 + Math.random() * 8;
                const animationStr = `${randomFloat} ${duration}s infinite alternate ease-in-out`;
                cloud.style.animation = animationStr;
                cloud.dataset.originalAnimation = animationStr;

                // 拖拽逻辑 (与之前相同)
                let dragStartLeftPx = 0, dragStartTopPx = 0;
                let startMouseX = 0, startMouseY = 0;
                let isDraggingThis = false;
                let hasMoved = false;
                let mouseDownTime = 0;
                let lastMoveTime = 0, lastMoveX = 0, lastMoveY = 0;
                let finalVelocity = { x: 0, y: 0 };

                cloud.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    if (cloud.dataset.disabled === 'true') return;
                    mouseDownTime = Date.now();
                    startMouseX = e.clientX;
                    startMouseY = e.clientY;
                    dragStartLeftPx = cloud.offsetLeft;
                    dragStartTopPx = cloud.offsetTop;
                    hasMoved = false;
                    isDraggingThis = false;
                    cloud.classList.add('drag-active');
                    cloud.style.animation = 'none';
                    lastMoveTime = Date.now();
                    lastMoveX = e.clientX;
                    lastMoveY = e.clientY;
                    finalVelocity = { x: 0, y: 0 };

                    const onMouseMove = (moveEvent) => {
                        const dx = moveEvent.clientX - startMouseX;
                        const dy = moveEvent.clientY - startMouseY;
                        if (!hasMoved && (Math.hypot(dx, dy) > 5)) {
                            hasMoved = true;
                            isDraggingThis = true;
                            cloud.style.cursor = 'grabbing';
                        }
                        if (isDraggingThis) {
                            moveEvent.preventDefault();
                            let newLeft = dragStartLeftPx + dx;
                            let newTop = dragStartTopPx + dy;
                            const maxLeft = window.innerWidth - cloud.offsetWidth;
                            const maxTop = window.innerHeight - cloud.offsetHeight;
                            newLeft = Math.min(Math.max(0, newLeft), maxLeft);
                            newTop = Math.min(Math.max(0, newTop), maxTop);
                            cloud.style.left = newLeft + 'px';
                            cloud.style.top = newTop + 'px';
                            const now = Date.now();
                            const dt = Math.max(1, now - lastMoveTime);
                            const vx = (moveEvent.clientX - lastMoveX) / dt;
                            const vy = (moveEvent.clientY - lastMoveY) / dt;
                            finalVelocity = { x: vx * 16, y: vy * 16 };
                            lastMoveTime = now;
                            lastMoveX = moveEvent.clientX;
                            lastMoveY = moveEvent.clientY;
                        }
                    };

                    const onMouseUp = (upEvent) => {
                        window.removeEventListener('mousemove', onMouseMove);
                        window.removeEventListener('mouseup', onMouseUp);
                        cloud.classList.remove('drag-active');
                        if (isDraggingThis) {
                            const speed = Math.hypot(finalVelocity.x, finalVelocity.y);
                            if (speed > 0.8) {
                                startInertia(cloud, finalVelocity.x, finalVelocity.y);
                            } else {
                                if (cloud && !cloud.dataset.disabled) {
                                    cloud.style.animation = cloud.dataset.originalAnimation;
                                }
                            }
                        } else if (!hasMoved && (Date.now() - mouseDownTime < 200)) {
                            if (cloud.dataset.disabled !== 'true') {
                                cloud.dataset.disabled = 'true';
                                const stressText = item;
                                const dissolveType = getWeightedDissolveType();
                                applyDissolve(cloud, dissolveType, () => {
                                    if (cloud.parentNode) cloud.remove();
                                    removeOrder.push(stressText);
                                    if (removeOrder.length === pressures.length) {
                                        setTimeout(() => generateReport(), 600);
                                    }
                                });
                            }
                        } else {
                            if (cloud && !cloud.dataset.disabled) {
                                cloud.style.animation = cloud.dataset.originalAnimation;
                            }
                        }
                        isDraggingThis = false;
                        hasMoved = false;
                    };

                    window.addEventListener('mousemove', onMouseMove);
                    window.addEventListener('mouseup', onMouseUp);
                });

                document.body.appendChild(cloud);
            });
        }

        // 压力报告 (完整内容)
        function getFullSolution(stress) {
            const solutions = {

        function generateReport() {
            let mainStress = removeOrder[0];
            let lastStress = removeOrder[removeOrder.length - 1];
            let html = `
                <p>✅ 你最想先吹散的压力：<strong>${mainStress}</strong><br>
                ✅ 对你影响最小的压力：<strong>${lastStress}</strong></p>
                ${getFullSolution(mainStress)}
                <p>💖 不用强迫自己立刻变好，一步一步来，你已经超棒啦～</p>
            `;
            document.getElementById("reportContent").innerHTML = html;
            document.getElementById("report").style.display = "block";
        }

        window.onload = () => {
            createClouds();
        };

    // 全局BGM控制（通过iframe与audio-service通信）
    const BGM_KEY = 'xinling_bgm';
    let bgmFrame = null;
    let isPlaying = false;

    function getBGMState() {
        const state = localStorage.getItem(BGM_KEY);
        return state ? JSON.parse(state) : { playing: true, currentTime: 0 };
    }

    function saveBGMState(playing, currentTime) {
        localStorage.setItem(BGM_KEY, JSON.stringify({ playing, currentTime }));
    }

    function initBGM() {
        bgmFrame = document.getElementById('bgmFrame');
        const state = getBGMState();
        isPlaying = state.playing;
        updateBGMIcon(state.playing);

        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'bgmState') {
                isPlaying = e.data.playing;
                updateBGMIcon(e.data.playing);
            }
        });

        window.addEventListener('storage', (e) => {
            if (e.key === BGM_KEY && e.newValue) {
                try {
                    const state = JSON.parse(e.newValue);
                    isPlaying = state.playing;
                    updateBGMIcon(state.playing);
                } catch(err) {}
            }
        });

        setTimeout(() => {
            bgmFrame.contentWindow.postMessage({ type: 'getState' }, '*');
        }, 100);
    }

    function updateBGMIcon(playing) {
        const bgmIcon = document.getElementById('bgmIcon');
        if (playing) {
            bgmIcon.style.transform = 'scale(1.1)';
            bgmIcon.style.animation = 'spin 3s linear infinite';
        } else {
            bgmIcon.style.transform = 'scale(1)';
            bgmIcon.style.animation = '';
        }
    }

    function toggleBGM() {
        if (bgmFrame && bgmFrame.contentWindow) {
            bgmFrame.contentWindow.postMessage({ type: 'toggle' }, '*');
        }
    }

    // 旋转动画
    const style = document.createElement('style');
    style.textContent = `
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    `;
    document.head.appendChild(style);

    window.addEventListener('load', () => {
        initBGM();
    });
</script>

    <!-- 全局BGM播放器（隐藏iframe） -->
    <iframe id="bgmFrame" src="../../static/audio-service.html" style="display:none;" width="0" height="0"></iframe>
