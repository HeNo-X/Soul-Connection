<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵共鸣舱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .carousel-wrapper {
            transition: transform 0.7s ease;
        }
        .carousel-item {
            opacity: 0;
            transform: scale(1.08);
            transition: opacity 1.1s ease, transform 1.1s ease-out;
        }
        .carousel-item.active {
            opacity: 1;
            transform: scale(1);
        }
        .fade-in-text {
            opacity: 0;
            transform: translateY(24px);
            animation: textFadeIn 1.7s ease-out forwards;
        }
        @keyframes textFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
<div class="relative h-screen w-full overflow-hidden">
    <div id="carousel" class="carousel-wrapper flex h-full">
        <!-- 第1张 + 日历图标 -->
        <div class="carousel-item w-full flex-shrink-0 h-full relative">
            <img src="./static/LargePic/背景1.jpg" alt="背景1" class="w-full h-full object-cover" loading="lazy">
            
            <!-- 日历小图标 + 年月 -->
            <div class="absolute top-6 left-6 bg-white/10 backdrop-blur-sm px-4 py-2 rounded-xl text-white text-sm flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span>2026年04月</span>
            </div>

            <div class="absolute inset-0 bg-black/30 flex flex-col justify-center items-center">
                <p class="fade-in-text text-white text-[clamp(1.2rem,4vw,2rem)] mb-4 leading-relaxed px-4 text-center">
                    世界很吵，心也会累。<br>
                    有人说：“心理委员，<br>
                    俺不得劲。”<br>
                    没关系，情绪从来都不用硬扛。
                </p>
            </div>
        </div>

        <!-- 第2张 -->
        <div class="carousel-item w-full flex-shrink-0 h-full relative">
            <img src="./static/LargePic/背景2.jpg" alt="背景2" class="w-full h-full object-cover" loading="lazy">
            <div class="absolute inset-0 bg-black/20 flex flex-col justify-center items-center">
                <p class="fade-in-text text-white text-[clamp(1.2rem,4vw,2rem)] mb-4 leading-relaxed px-4 text-center">
                    所以我们创造了它——<br>
                    心灵共鸣舱。这里没有催促，没有标准答案，<br>
                    只有温柔的陪伴，和稳稳的接纳。<br>
                    一呼一吸，把不安慢慢放下。
                </p>
            </div>
        </div>

        <!-- 第3张 -->
        <div class="carousel-item w-full flex-shrink-0 h-full relative">
            <img src="./static/LargePic/背景3.jpg" alt="背景3" class="w-full h-full object-cover" loading="lazy">
            <div class="absolute inset-0 bg-black/20 flex flex-col justify-center items-center">
                <p class="fade-in-text text-white text-[clamp(1.2rem,4vw,2rem)] mb-8 leading-relaxed px-4 text-center">
                    来到这里，我们一起对自己说一句：<br>
                    “爱你老己”<br>
                    好好爱自己，就是最棒的自愈。
                </p>
                <button id="jumpButton" 
                    class="bg-[#ff85a3] hover:bg-[#ff6b8f] text-white text-xl px-10 py-5 rounded-xl font-bold shadow-lg">
                    欢迎来到心灵共鸣舱
                </button>
            </div>
        </div>
    </div>

    <div class="absolute bottom-8 left-0 right-0 flex justify-center gap-3">
        <button class="carousel-dot h-3 w-6 rounded-full bg-white/60 active" data-index="0"></button>
        <button class="carousel-dot h-3 w-6 rounded-full bg-white/60" data-index="1"></button>
        <button class="carousel-dot h-3 w-6 rounded-full bg-white/60" data-index="2"></button>
    </div>
</div>

<script>
    const carousel = document.getElementById('carousel');
    const dots = document.querySelectorAll('.carousel-dot');
    const items = document.querySelectorAll('.carousel-item');
    const jumpButton = document.getElementById('jumpButton');
    let currentIndex = 0;
    const totalSlides = items.length;
    let isAutoPlaying = true;

    function updateCarousel(index) {
        carousel.style.transform = `translateX(-${index * 100}%)`;

        items.forEach((item, i) => {
            item.classList.toggle('active', i === index);
        });

        document.querySelectorAll('.fade-in-text').forEach(text => {
            text.style.animation = 'none';
            text.offsetHeight;
            text.style.animation = 'textFadeIn 1.7s ease-out forwards';
        });

        dots.forEach((dot, i) => {
            dot.classList.toggle('bg-white', i === index);
            dot.classList.toggle('bg-white/60', i !== index);
        });

        currentIndex = index;
        
        // 如果到达最后一张，停止自动轮播
        if (index === totalSlides - 1) {
            isAutoPlaying = false;
        }
    }

    dots.forEach(dot => {
        dot.addEventListener('click', () => {
            updateCarousel(+dot.dataset.index);
        });
    });

    // 修正按钮跳转事件
    if (jumpButton) {
        jumpButton.addEventListener('click', () => {
            window.location.href = './Pages/MainPage/LogIn.html';
        });
    }

    // 自动轮播，只轮播一次
    let intervalId = setInterval(() => {
        if (isAutoPlaying) {
            currentIndex = (currentIndex + 1) % totalSlides;
            updateCarousel(currentIndex);
        } else {
            clearInterval(intervalId);
        }
    }, 5500);

    updateCarousel(0);
</script>
</body>
</html>
