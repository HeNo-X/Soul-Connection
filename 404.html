<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - 心灵共鸣舱</title>
    <style>
        body {
            background: linear-gradient(90deg, #faccdc 0%, #f1e9ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .content {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        h1 {
            font-size: 6rem;
            margin: 0;
            background: linear-gradient(135deg, #e87c9f, #b382c2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        h2 {
            font-size: 2rem;
            color: #6d4a5c;
            margin: 20px 0;
        }
        p {
            font-size: 1.1rem;
            color: #5f3e4c;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(135deg, #e87c9f, #b382c2);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(232, 124, 159, 0.3);
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>404</h1>
        <h2>页面未找到</h2>
        <p>抱歉，您访问的页面不存在或已被移动。</p>
        <a href="/" class="btn">返回首页</a>
    </div>
</body>
</html>
