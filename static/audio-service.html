<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Audio Service</title>
</head>
<body>
<script>
(function() {
    const BGM_KEY = 'xinling_bgm';
    let bgm = null;
    let isPlaying = false;

    function initBGM() {
        bgm = new Audio('./Radio.mp3');
        bgm.loop = true;
        bgm.volume = 0.5;
        bgm.preload = 'auto';

        const state = getBGMState();
        bgm.currentTime = state.currentTime || 0;
        isPlaying = state.playing;

        bgm.addEventListener('canplay', () => {
            if (isPlaying) {
                bgm.play().catch(() => {});
            }
        });

        bgm.addEventListener('timeupdate', () => {
            if (bgm.currentTime > 0) {
                saveBGMState(!bgm.paused, bgm.currentTime);
            }
        });

        bgm.addEventListener('pause', () => {
            isPlaying = false;
            saveBGMState(false, bgm.currentTime);
        });

        bgm.addEventListener('play', () => {
            isPlaying = true;
            saveBGMState(true, bgm.currentTime);
        });

        if (isPlaying) {
            bgm.play().catch(() => {});
        }
    }

    function getBGMState() {
        const state = localStorage.getItem(BGM_KEY);
        return state ? JSON.parse(state) : { playing: true, currentTime: 0 };
    }

    function saveBGMState(playing, currentTime) {
        localStorage.setItem(BGM_KEY, JSON.stringify({ playing, currentTime }));
    }

    window.addEventListener('message', (e) => {
        if (!e.data || !e.data.type || !bgm) return;
        switch (e.data.type) {
            case 'play':
                bgm.play().catch(() => {});
                break;
            case 'pause':
                bgm.pause();
                break;
            case 'toggle':
                if (bgm.paused) {
                    bgm.play().catch(() => {});
                } else {
                    bgm.pause();
                }
                break;
            case 'getState':
                e.source.postMessage({
                    type: 'bgmState',
                    playing: !bgm.paused,
                    currentTime: bgm.currentTime
                }, '*');
                break;
        }
    });

    initBGM();
})();
</script>
</body>
</html>
