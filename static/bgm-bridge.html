<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BGMBridge</title>
</head>
<body>
<script>
(function() {
    const BGM_KEY = 'xinling_bgm';
    const CHANNEL_NAME = 'xinling_bgm_channel';
    let channel = null;
    let bgm = null;

    function initChannel() {
        try {
            channel = new BroadcastChannel(CHANNEL_NAME);
            channel.onmessage = (e) => {
                if (e.data && e.data.type === 'stateUpdate' && bgm) {
                    const state = e.data.state;
                    bgm.currentTime = state.currentTime || 0;
                    if (state.playing && bgm.paused) {
                        bgm.play().catch(() => {});
                    } else if (!state.playing && !bgm.paused) {
                        bgm.pause();
                    }
                }
            };
        } catch(err) {}
    }

    function initBGM() {
        bgm = new Audio();
        bgm.loop = true;
        bgm.volume = 0.5;
        bgm.src = './Radio.mp3';
        bgm.preload = 'auto';

        bgm.addEventListener('canplay', () => {
            const state = getState();
            if (state.playing) {
                bgm.play().catch(() => {});
            }
        });

        bgm.addEventListener('timeupdate', () => {
            if (bgm.currentTime > 0) {
                const state = { playing: !bgm.paused, currentTime: bgm.currentTime };
                localStorage.setItem(BGM_KEY, JSON.stringify(state));
                if (channel) {
                    channel.postMessage({ type: 'stateUpdate', state });
                }
            }
        });

        bgm.addEventListener('pause', () => {
            const state = { playing: false, currentTime: bgm.currentTime };
            localStorage.setItem(BGM_KEY, JSON.stringify(state));
            if (channel) {
                channel.postMessage({ type: 'stateUpdate', state });
            }
        });

        bgm.addEventListener('play', () => {
            const state = { playing: true, currentTime: bgm.currentTime };
            localStorage.setItem(BGM_KEY, JSON.stringify(state));
            if (channel) {
                channel.postMessage({ type: 'stateUpdate', state });
            }
        });

        bgm.load();
    }

    function getState() {
        const state = localStorage.getItem(BGM_KEY);
        return state ? JSON.parse(state) : { playing: true, currentTime: 0 };
    }

    window.addEventListener('message', (e) => {
        if (!e.data || !e.data.type || !bgm) return;
        switch (e.data.type) {
            case 'play':
                bgm.play().catch(() => {});
                break;
            case 'pause':
                bgm.pause();
                break;
            case 'toggle':
                if (bgm.paused) {
                    bgm.play().catch(() => {});
                } else {
                    bgm.pause();
                }
                break;
        }
    });

    initChannel();
    initBGM();
})();
</script>
</body>
</html>
